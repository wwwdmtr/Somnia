name: Deploy Dockploy

on:
  push:
    branches:
      - master
    paths:
      - 'server/**'
      - 'webapp/**'
      - 'shared/**'
      - '.npmrc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      webapp: ${{ steps.filter.outputs.webapp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
              - 'shared/**'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            webapp:
              - 'webapp/**'
              - 'shared/**'
              - 'server/src/**'
              - 'server/package.json'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  deploy-server:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    steps:
      - name: Trigger server deploy via Dokploy API
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          APPLICATION_ID: ${{ secrets.DOKPLOY_SERVER_APPLICATION_ID }}
        run: |
          if [ -z "$DOKPLOY_URL" ]; then
            echo "DOKPLOY_URL secret is missing"
            exit 1
          fi
          if [ -z "$DOKPLOY_API_KEY" ]; then
            echo "DOKPLOY_API_KEY secret is missing"
            exit 1
          fi
          if [ -z "$APPLICATION_ID" ]; then
            echo "DOKPLOY_SERVER_APPLICATION_ID secret is missing"
            exit 1
          fi

          API_URL="${DOKPLOY_URL%/}/api/application.deploy"
          JSON_PAYLOAD="{\"applicationId\":\"$APPLICATION_ID\"}"

          curl --request POST "$API_URL" \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "x-api-key: $DOKPLOY_API_KEY" \
            --data "$JSON_PAYLOAD" \
            --fail-with-body \
            --show-error \
            --silent

  deploy-webapp:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    steps:
      - name: Trigger webapp deploy via Dokploy API
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          APPLICATION_ID: ${{ secrets.DOKPLOY_WEBAPP_APPLICATION_ID }}
        run: |
          if [ -z "$DOKPLOY_URL" ]; then
            echo "DOKPLOY_URL secret is missing"
            exit 1
          fi
          if [ -z "$DOKPLOY_API_KEY" ]; then
            echo "DOKPLOY_API_KEY secret is missing"
            exit 1
          fi
          if [ -z "$APPLICATION_ID" ]; then
            echo "DOKPLOY_WEBAPP_APPLICATION_ID secret is missing"
            exit 1
          fi

          API_URL="${DOKPLOY_URL%/}/api/application.deploy"
          JSON_PAYLOAD="{\"applicationId\":\"$APPLICATION_ID\"}"

          curl --request POST "$API_URL" \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "x-api-key: $DOKPLOY_API_KEY" \
            --data "$JSON_PAYLOAD" \
            --fail-with-body \
            --show-error \
            --silent
