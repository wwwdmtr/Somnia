name: Deploy Dockploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      webapp: ${{ steps.filter.outputs.webapp }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
            webapp:
              - 'webapp/**'
            shared:
              - 'shared/**'

  deploy-server:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Trigger server deploy hook
        env:
          HOOK_URL: ${{ secrets.DOCKPLOY_SERVER_HOOK }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "DOCKPLOY_SERVER_HOOK secret is missing"
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$HOOK_URL"

  deploy-webapp:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.webapp == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Trigger webapp deploy hook
        env:
          HOOK_URL: ${{ secrets.DOCKPLOY_WEBAPP_HOOK }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "DOCKPLOY_WEBAPP_HOOK secret is missing"
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$HOOK_URL"
